<!doctype html>
<html lang="en">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Document</title>
   </head>
   <body>
      <main>
         <div class="front-layer">
            <h1 id="title">Armada</h1>
            <button id="start-btn">Start Game</button>
         </div>
         <div class="deployment-layer hide">
            <div class="name-container">
               <input type="text" id="name" required placeholder="Name" />
            </div>
            <div class="board-container">
               <div class="docks-container">
                  <div class="ships" id="patrol-boat" data-length="2" data-isVertical="false" draggable="true">
                     <span class="blocks"></span>
                     <span class="blocks"></span>
                  </div>
                  <div class="ships" id="battleship" data-length="3" data-isVertical="false" draggable="true">
                     <span class="blocks"></span>
                     <span class="blocks"></span>
                     <span class="blocks"></span>
                  </div>
               </div>
            </div>
            <button type="button" id="continue">continue</button>
         </div>
         <div class="battle-layer hide"></div>
      </main>
   </body>
</html>
