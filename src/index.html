<!doctype html>
<html lang="en">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Document</title>
   </head>
   <body>
      <main>
         <div class="front-layer">
            <h1 id="title">Armada</h1>
            <button id="start-btn">Start Game</button>
         </div>
         <div class="deployment-layer hide">
            <div class="name-container">
               <input type="text" id="name" required placeholder="Name" maxlength="20" />
               <span class="name-error hide">Please enter a name (2-20 characters)</span>
            </div>
            <span class="ships-error hide">Please deploy all ships before continuing</span>
            <div class="board-container">
               <div class="docks-container">
                  <div class="ships" id="patrol-boat" data-length="2" draggable="true">
                     <span class="blocks"></span><span class="blocks"></span>
                  </div>
                  <div class="ships" id="destroyer" data-length="3" draggable="true">
                     <span class="blocks"></span><span class="blocks"></span><span class="blocks"></span>
                  </div>
                  <div class="ships" id="cruiser" data-length="3" draggable="true">
                     <span class="blocks"></span><span class="blocks"></span><span class="blocks"></span>
                  </div>
                  <div class="ships" id="battleship" data-length="4" draggable="true">
                     <span class="blocks"></span><span class="blocks"></span><span class="blocks"></span><span class="blocks"></span>
                  </div>
                  <div class="ships" id="carrier" data-length="5" draggable="true">
                     <span class="blocks"></span><span class="blocks"></span><span class="blocks"></span><span class="blocks"></span><span class="blocks"></span>
                  </div>
               </div>
            </div>
            <button type="button" id="continue">continue</button>
         </div>
         <div class="battle-layer hide">
            <div class="battle-header">
               <div class="player-name" id="player-name"></div>
               <div class="vs">VS</div>
               <div class="computer-name" id="computer-name"></div>
            </div>
            <div class="arenas">
               <div class="arena player">
                  <div class="arena-label">YOUR FLEET</div>
                  <div class="player-area"></div>
               </div>
               <div class="arena enemy">
                  <div class="arena-label">ENEMY WATERS</div>
                  <div class="enemy-area"></div>
               </div>
            </div>
         </div>
         <button id="mute-btn" aria-label="Toggle music">🔊</button>
         <div class="win-modal victory hide">
            <div class="win-title">Victory</div>
            <div class="win-subtitle">Well played, <span class="winner-name"></span></div>
            <div class="win-actions">
               <button class="primary" id="play-again-btn">Play Again</button>
               <button id="main-menu-btn">Main Menu</button>
            </div>
         </div>
         <div class="win-backdrop hide"></div>
      </main>
   </body>
</html>
